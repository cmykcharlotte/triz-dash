<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Charlotte</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#4a6fa5;--sec:#7a9e7e;--pos:#6bc78f;--neg:#d17b6a;--text:#e2e8f0;--dim:#7a8494;--muted:#5a6474;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1e293b;--dim:#7a8494;--muted:#9ca3af;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px 24px 40px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--sec);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--dim);font-size:13px}#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px}.sub{font-size:12px;color:var(--dim);margin-top:3px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1 1 0;min-width:115;transition:background .3s,border-color .3s}
.sc-l{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:4px}
.sc-v{font-size:24px;font-weight:700;line-height:1.1}.sc-s{font-size:10px;color:var(--muted);margin-top:3px}
.stitle{display:flex;align-items:center;gap:8px;margin:24px 0 12px;font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:background .3s,border-color .3s}
.cw{position:relative;width:100%;height:240px}.cw-sm{position:relative;width:100%;height:180px}
.two{display:flex;gap:14px;flex-wrap:wrap}.two .wide{flex:2 1 380px}.two .narrow{flex:1 1 200px}
.three{display:flex;gap:14px;flex-wrap:wrap}.three>div{flex:1 1 250px}
.mono{font-family:'DM Mono',monospace}
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.leg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}.leg-d{width:7px;height:7px;border-radius:2px}
.footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
</style></head><body>
<div id="loading"><div class="spinner"></div><p>Loading Charlotte's data…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Charlotte's tirzepatide dashboard</h1><div class="sub" id="sub"></div></div><button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="stats"></div>
<div class="stitle">Weight over time</div><div class="cc"><div class="cw"><canvas id="weightChart"></canvas></div></div>
<div class="stitle">Dose escalation</div><div class="cc"><div class="cw"><canvas id="doseChart"></canvas></div>
<div class="legend"><div class="leg-i"><div class="leg-d" style="background:var(--pri)"></div>Effective weekly dose</div><div class="leg-i"><div class="leg-d" style="background:var(--sec)"></div>Per-injection dose</div></div></div>
<div class="three"><div><div class="stitle">Monthly mg used</div><div class="cc"><div class="cw-sm"><canvas id="monthMgChart"></canvas></div></div></div><div><div class="stitle">Monthly weight change</div><div class="cc"><div class="cw-sm"><canvas id="monthWtChart"></canvas></div></div></div><div><div class="stitle">Use by pharmacy</div><div class="cc" style="text-align:center"><div class="cw-sm"><canvas id="pharmChart"></canvas></div><div class="legend" id="pharmLeg"></div></div></div></div>
<div class="footer"><div>Charlotte's dashboard • Grist custom widget</div><div id="ftr"></div></div>
</div>
<script>
const PN='Charlotte',PC={Hallandale:'#4a6fa5',BPI:'#7a9e7e',Southend:'#d17b6a',Olympia:'#c4985a'};
let charts={},DATA=null;

function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p];if(DATA)render(DATA)}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('tirz-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
function gc(){return isDark()?'#7a8494':'#9ca3af'}function gg(){return isDark()?'#1e2a3a':'#dce1e8'}
function ttip(){return{backgroundColor:isDark()?'#172030':'#fff',titleColor:'#7a8494',bodyColor:isDark()?'#e2e8f0':'#1e293b',borderColor:isDark()?'#2a3448':'#dce1e8',borderWidth:1,padding:10,cornerRadius:8,titleFont:{size:11},bodyFont:{size:12}}}

grist.ready({requiredAccess:'full'});
async function load(){try{const[pe,ph,or,vi,inj]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Pharmacies'),grist.docApi.fetchTable('Orders'),grist.docApi.fetchTable('Vials'),grist.docApi.fetchTable('Injections')]);DATA={people:pe,pharmacies:ph,orders:or,vials:vi,injections:inj};document.getElementById('loading').style.display='none';document.getElementById('dash').style.display='block';render(DATA)}catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}}
load();grist.onRecords(()=>load());

function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function fmtS(iso){if(!iso)return'';const[,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}`}
function destroy(n){if(charts[n]){charts[n].destroy();charts[n]=null}}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

function render(D){
const people=toRows(D.people),pharms=toRows(D.pharmacies),allOrd=toRows(D.orders),allVi=toRows(D.vials),allInj=toRows(D.injections);
const pharmMap={};pharms.forEach(p=>pharmMap[p._id]=p);
const person=people.find(p=>p.Name===PN);if(!person)return;const pid=person._id;
const injs=allInj.filter(i=>i.Person===pid).sort((a,b)=>(a.Date||0)-(b.Date||0));
const ti=injs.length,tm=injs.reduce((s,i)=>s+(i.Amount_mg||0),0);
const ww=injs.filter(i=>i.Weight&&i.Weight>0),cw=ww.length?ww[ww.length-1].Weight:null,sw=person.Starting_Weight,wl=sw&&cw?sw-cw:null,wp=wl&&sw?(wl/sw*100):null;
const li=injs[injs.length-1],ld=li?ep2d(li.Date):null;
const days=person.Start_Date?Math.round((Date.now()/1000-person.Start_Date)/86400):null;
document.getElementById('sub').textContent=`Data through ${ld?fmtD(ld):'N/A'} \u2022 ${days?days+' days on treatment':''}`;
document.getElementById('stats').innerHTML=[
  sc('Weight loss',wl?wl.toFixed(1)+' lbs':'\u2014',wp?wp.toFixed(0)+'% of starting weight':'','var(--pos)'),
  sc('Current weight',cw?cw.toFixed(1):'\u2014',sw?'Started at '+sw:'','var(--pri)'),
  sc('Current EWD',li&&li.Effective_Weekly_Dose?li.Effective_Weekly_Dose+'mg':'\u2014',li&&li.Dosing_Frequency_Days?'Every '+li.Dosing_Frequency_Days+' days':'','var(--sec)'),
  sc('Per-injection dose',li?li.Amount_mg+'mg':'\u2014','','var(--dim)'),
  sc('Injections',ti,tm.toFixed(1)+'mg total','var(--pri)'),
].join('');

// Weight chart
if(ww.length>2){destroy('weight');const lb=ww.map(d=>fmtS(ep2d(d.Date))),vl=ww.map(d=>d.Weight);
charts.weight=new Chart(document.getElementById('weightChart'),{type:'line',data:{labels:lb,datasets:[{label:'Weight',data:vl,borderColor:'#7a9e7e',backgroundColor:isDark()?'rgba(122,158,126,.08)':'rgba(122,158,126,.15)',fill:true,tension:.3,pointRadius:0,pointHitRadius:8,borderWidth:2},{label:'Start',data:vl.map(()=>sw),borderColor:'#5a6474',borderDash:[6,4],borderWidth:1,pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip(),filter:i=>i.datasetIndex===0,callbacks:{label:c=>c.parsed.y+' lbs'}}},scales:{x:{ticks:{color:gc(),font:{size:10},maxTicksLimit:10},grid:{color:gg()}},y:{ticks:{color:gc(),font:{size:10}},grid:{color:gg()},suggestedMin:Math.min(...vl)-5,suggestedMax:Math.max(...vl)+5}}}})}

// Dose escalation
const dd=injs.filter(i=>i.Effective_Weekly_Dose&&i.Effective_Weekly_Dose>0);
if(dd.length){destroy('dose');charts.dose=new Chart(document.getElementById('doseChart'),{type:'line',data:{labels:dd.map(d=>fmtS(ep2d(d.Date))),datasets:[{label:'EWD',data:dd.map(d=>d.Effective_Weekly_Dose),borderColor:'#4a6fa5',backgroundColor:isDark()?'rgba(74,111,165,.08)':'rgba(74,111,165,.12)',fill:true,stepped:'after',borderWidth:2,pointRadius:0},{label:'Dose',data:dd.map(d=>d.Amount_mg),borderColor:'#7a9e7e',borderWidth:1.5,borderDash:[4,3],pointRadius:0,tension:.2,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{ticks:{color:gc(),font:{size:10},maxTicksLimit:10},grid:{color:gg()}},y:{ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}})}

// Monthly mg
const mo={};injs.forEach(i=>{const d=ep2d(i.Date);if(!d)return;const ym=d.slice(0,7);if(!mo[ym])mo[ym]={mg:0,wFirst:null,wLast:null};mo[ym].mg+=(i.Amount_mg||0);if(i.Weight&&i.Weight>0){if(!mo[ym].wFirst)mo[ym].wFirst=i.Weight;mo[ym].wLast=i.Weight}});
const mks=Object.keys(mo).sort(),mls=mks.map(k=>{const[y,m]=k.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[+m]+" '"+y.slice(2)});
destroy('monthMg');charts.monthMg=new Chart(document.getElementById('monthMgChart'),{type:'bar',data:{labels:mls,datasets:[{data:mks.map(k=>Math.round(mo[k].mg*10)/10),backgroundColor:'#4a6fa5',borderRadius:5,maxBarThickness:36}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>c.parsed.y+'mg'}}},scales:{x:{ticks:{color:gc(),font:{size:10}},grid:{display:false}},y:{ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}});

// Monthly weight change
const mwc=mks.map((k,i)=>{if(i===0)return mo[k].wLast&&mo[k].wFirst?Math.round((mo[k].wLast-mo[k].wFirst)*10)/10:null;const prev=mo[mks[i-1]];const curr=mo[k];if(prev?.wLast&&curr?.wLast)return Math.round((curr.wLast-prev.wLast)*10)/10;return null});
destroy('monthWt');charts.monthWt=new Chart(document.getElementById('monthWtChart'),{type:'bar',data:{labels:mls,datasets:[{data:mwc,backgroundColor:mwc.map(v=>v!=null&&v<=0?'#6bc78f':'#d17b6a'),borderRadius:4,maxBarThickness:36}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>(c.parsed.y>0?'+':'')+c.parsed.y+' lbs'}}},scales:{x:{ticks:{color:gc(),font:{size:10}},grid:{display:false}},y:{ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}});

// Pharmacy use
const pu={};injs.forEach(i=>{if(!i.Vial)return;const v=allVi.find(v2=>v2._id===i.Vial);if(!v)return;const o=allOrd.find(o2=>o2._id===v.Order);if(!o)return;const ph=pharmMap[o.Pharmacy];if(!ph)return;pu[ph.Compounding_Pharmacy]=(pu[ph.Compounding_Pharmacy]||0)+(i.Amount_mg||0)});
const lm=Object.values(pu).reduce((s,v)=>s+v,0);if(tm-lm>0.5)pu['Unlinked']=Math.round((tm-lm)*10)/10;
destroy('pharm');const pns=Object.keys(pu);
charts.pharm=new Chart(document.getElementById('pharmChart'),{type:'doughnut',data:{labels:pns,datasets:[{data:pns.map(p=>Math.round(pu[p]*10)/10),backgroundColor:pns.map(p=>PC[p]||'#5a6474'),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>{const t=pns.reduce((s,p)=>s+pu[p],0);return c.label+': '+c.parsed+'mg ('+Math.round(c.parsed/t*100)+'%)'}}}}}});
document.getElementById('pharmLeg').innerHTML=pns.map(p=>`<div class="leg-i"><div class="leg-d" style="background:${PC[p]||'#5a6474'}"></div>${p} (${Math.round(pu[p]*10)/10}mg)</div>`).join('');

document.getElementById('ftr').textContent=`${ti} injections \u2022 ${tm.toFixed(1)}mg`;
}
</script></body></html>
