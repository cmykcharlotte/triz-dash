<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tirzepatide Overview</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#4a6fa5;--sec:#7a9e7e;--pos:#6bc78f;--neg:#d17b6a;--text:#e2e8f0;--dim:#7a8494;--muted:#5a6474;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1e293b;--dim:#7a8494;--muted:#9ca3af;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px 24px 40px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{color:var(--dim);font-size:13px}
#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px}
.sub{font-size:12px;color:var(--dim);margin-top:3px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}
.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1 1 0;min-width:125;transition:background .3s,border-color .3s}
.sc-l{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:4px}
.sc-v{font-size:24px;font-weight:700;line-height:1.1}
.sc-s{font-size:10px;color:var(--muted);margin-top:3px}
.stitle{display:flex;align-items:center;gap:8px;margin:24px 0 12px;font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:background .3s,border-color .3s}
.cw{position:relative;width:100%;height:220px}
.cw-sm{position:relative;width:100%;height:180px}
.two{display:flex;gap:14px;flex-wrap:wrap}.two>.half{flex:1 1 300px}
.three{display:flex;gap:14px;flex-wrap:wrap}.three>div{flex:1 1 200px}
.mono{font-family:'DM Mono',monospace}
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.leg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}
.leg-d{width:7px;height:7px;border-radius:2px}
.footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;flex:1 1 300px;transition:background .3s,border-color .3s}
.pname{font-size:16px;font-weight:700;margin-bottom:2px}
.pstatus{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:10px}
.pstatus.on{background:rgba(107,199,143,.15);color:var(--pos)}
.pstatus.off{background:rgba(122,132,148,.15);color:var(--dim)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pg-i{padding:6px 0}.pg-l{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);margin-bottom:2px}
.pg-v{font-size:16px;font-weight:700}.pg-s{font-size:10px;color:var(--muted)}
.pbar{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.bar-l{display:flex;justify-content:space-between;font-size:10px;color:var(--dim)}
.bar-t{background:var(--border);border-radius:5px;height:8px;overflow:hidden;margin:5px 0}
.bar-f{height:100%;border-radius:5px;transition:width .3s}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><p>Connecting to Grist…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Tirzepatide tracker</h1><div class="sub" id="sub"></div></div>
<button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="topStats"></div>
<div class="stitle">Per-person summary</div>
<div class="two" id="personCards"></div>
<div class="two" style="margin-top:0">
<div class="half"><div class="stitle">Usage by person</div><div class="cc"><div class="cw-sm"><canvas id="usageChart"></canvas></div></div></div>
<div class="half"><div class="stitle">Spending by person</div><div class="cc"><div class="cw-sm"><canvas id="spendChart"></canvas></div></div></div>
</div>
<div class="three">
<div><div class="stitle">Stock by pharmacy</div><div class="cc"><div class="cw-sm"><canvas id="stockChart"></canvas></div><div class="legend" id="stockLeg"></div></div></div>
<div><div class="stitle">Vial status</div><div class="cc" style="text-align:center"><div class="cw-sm"><canvas id="vialChart"></canvas></div><div class="legend" id="vialLeg"></div></div></div>
<div><div class="stitle">Monthly usage</div><div class="cc"><div class="cw-sm"><canvas id="monthChart"></canvas></div></div></div>
</div>
<div class="footer"><div>Overview • Grist custom widget</div><div id="ftr"></div></div>
</div>
<script>
const P1='#4a6fa5',P2='#7a9e7e',PC={Hallandale:'#4a6fa5',BPI:'#7a9e7e',Southend:'#d17b6a',Olympia:'#c4985a'},PCOL=[P1,P2],SCC={Finished:'#6bc78f','In Use':'#4a6fa5',Unopened:'#5a6474'};
let charts={},DATA=null;

// Theme system
function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(pref){if(pref==='light'||pref==='dark')return pref;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const labels={auto:'Auto',light:'Light',dark:'Dark'};const icons={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=icons[p]+' '+labels[p];if(DATA)render(DATA)}
function cycleTheme(){const order=['auto','light','dark'];const cur=getThemePref();const next=order[(order.indexOf(cur)+1)%3];localStorage.setItem('tirz-theme',next);applyTheme()}
applyTheme();

function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
function gc(){return isDark()?'#7a8494':'#9ca3af'}
function gg(){return isDark()?'#1e2a3a':'#dce1e8'}
function gt(){return isDark()?'#e2e8f0':'#1e293b'}
function ttip(){return{backgroundColor:isDark()?'#172030':'#fff',titleColor:'#7a8494',bodyColor:isDark()?'#e2e8f0':'#1e293b',borderColor:isDark()?'#2a3448':'#dce1e8',borderWidth:1,padding:10,cornerRadius:8,titleFont:{size:11},bodyFont:{size:12}}}

grist.ready({requiredAccess:'full'});
async function load(){try{const[pe,ph,or,vi,inj]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Pharmacies'),grist.docApi.fetchTable('Orders'),grist.docApi.fetchTable('Vials'),grist.docApi.fetchTable('Injections')]);DATA={people:pe,pharmacies:ph,orders:or,vials:vi,injections:inj};document.getElementById('loading').style.display='none';document.getElementById('dash').style.display='block';render(DATA)}catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}}
load();grist.onRecords(()=>load());

function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function usd(n){return n!=null?'$'+n.toLocaleString():'\u2014'}
function destroy(n){if(charts[n]){charts[n].destroy();charts[n]=null}}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

function render(D){
const people=toRows(D.people),pharms=toRows(D.pharmacies),orders=toRows(D.orders),vials=toRows(D.vials),injs=toRows(D.injections);
const pharmMap={};pharms.forEach(p=>pharmMap[p._id]=p);
const orderMap={};orders.forEach(o=>orderMap[o._id]=o);
const tmgo=orders.reduce((s,o)=>s+(o.Total_mg||0),0),tmu=injs.reduce((s,i)=>s+(i.Amount_mg||0),0),tc=orders.reduce((s,o)=>s+(o.Cost||0),0),toh=tmgo-tmu;
document.getElementById('sub').textContent=`${people.length} people \u2022 ${orders.length} orders \u2022 ${vials.length} vials \u2022 ${injs.length} injections`;
document.getElementById('topStats').innerHTML=[
  sc('Total used',tmu.toFixed(1)+' mg',injs.length+' injections','var(--pri)'),
  sc('On hand',toh.toFixed(1)+' mg',vials.filter(v=>v.Status==='Unopened').length+' unopened vials','var(--sec)'),
  sc('Total ordered',tmgo+' mg',orders.length+' orders','var(--dim)'),
  sc('Total spent',usd(tc),'$'+(tc/tmgo).toFixed(2)+'/mg ordered','var(--neg)'),
  sc('Avg cost/mg','\u2014'+' '+'$'+(tc/tmgo).toFixed(2),'Across all purchases','var(--dim)'),
].join('');

let ch='';people.forEach((p,idx)=>{const pi=injs.filter(i=>i.Person===p._id).sort((a,b)=>(a.Date||0)-(b.Date||0));const po=orders.filter(o=>o.Person===p._id);const mu=pi.reduce((s,i)=>s+(i.Amount_mg||0),0);const sp=po.reduce((s,o)=>s+(o.Cost||0),0);const mo=po.reduce((s,o)=>s+(o.Total_mg||0),0);const ww=pi.filter(i=>i.Weight&&i.Weight>0);const cw=ww.length?ww[ww.length-1].Weight:null;const sw=p.Starting_Weight;const wl=sw&&cw?sw-cw:null;const wp=wl&&sw?(wl/sw*100):null;const li=pi.length?pi[pi.length-1]:null;const ld=li?ep2d(li.Date):null;const fd=pi.length?ep2d(pi[0].Date):null;const ia=li&&li.Date&&(Date.now()/1000-li.Date)<90*86400;
ch+=`<div class="pcard"><div class="pname" style="color:${PCOL[idx]}">${p.Name}</div><span class="pstatus ${ia?'on':'off'}">${ia?'Active':'Inactive'}</span><div class="pgrid"><div class="pg-i"><div class="pg-l">Injections</div><div class="pg-v" style="color:var(--pri)">${pi.length}</div><div class="pg-s">${fmtD(fd)} \u2192 ${fmtD(ld)}</div></div><div class="pg-i"><div class="pg-l">mg used</div><div class="pg-v" style="color:var(--sec)">${mu.toFixed(1)}</div><div class="pg-s">of ${mo}mg ordered</div></div><div class="pg-i"><div class="pg-l">${wl!=null?'Weight loss':'Last dose'}</div><div class="pg-v" style="color:var(--pos)">${wl!=null?wl.toFixed(1)+' lbs':li?li.Amount_mg+'mg':'\u2014'}</div><div class="pg-s">${wp!=null?wp.toFixed(0)+'% \u2022 '+sw+' \u2192 '+cw.toFixed(1):li&&li.Dosing_Frequency_Days?'Every '+li.Dosing_Frequency_Days+' days':'No weight data'}</div></div><div class="pg-i"><div class="pg-l">Spent</div><div class="pg-v" style="color:var(--dim)">${usd(sp)}</div><div class="pg-s">${mu>0?'$'+(sp/mu).toFixed(2)+'/mg':'\u2014'}</div></div></div><div class="pbar"><div class="bar-l"><span>${mu.toFixed(0)}mg of ${mo}mg</span><span>${mo>0?Math.round(mu/mo*100):0}%</span></div><div class="bar-t"><div class="bar-f" style="width:${mo>0?Math.min(mu/mo*100,100):0}%;background:${PCOL[idx]}"></div></div></div></div>`;});
document.getElementById('personCards').innerHTML=ch;

destroy('usage');charts.usage=new Chart(document.getElementById('usageChart'),{type:'bar',data:{labels:people.map(p=>p.Name),datasets:[{data:people.map(p=>Math.round(injs.filter(i=>i.Person===p._id).reduce((s,i)=>s+(i.Amount_mg||0),0)*10)/10),backgroundColor:PCOL,borderRadius:6,maxBarThickness:70}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>c.parsed.x+'mg'}}},scales:{x:{ticks:{color:gc(),font:{size:10}},grid:{color:gg()}},y:{ticks:{color:gt(),font:{size:13,weight:600}},grid:{display:false}}}}});

destroy('spend');charts.spend=new Chart(document.getElementById('spendChart'),{type:'bar',data:{labels:people.map(p=>p.Name),datasets:[{data:people.map(p=>orders.filter(o=>o.Person===p._id).reduce((s,o)=>s+(o.Cost||0),0)),backgroundColor:PCOL,borderRadius:6,maxBarThickness:70}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>'$'+c.parsed.x.toLocaleString()}}},scales:{x:{ticks:{color:gc(),font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:gg()}},y:{ticks:{color:gt(),font:{size:13,weight:600}},grid:{display:false}}}}});

const byPh={};vials.forEach(v=>{const ord=orderMap[v.Order];if(!ord)return;const ph=pharmMap[ord.Pharmacy];if(!ph)return;const pn=ph.Compounding_Pharmacy;const pr=people.find(p=>p._id===ord.Person);if(!byPh[pn])byPh[pn]={};byPh[pn][pr?.Name||'?']=(byPh[pn][pr?.Name||'?']||0)+(v.mg_Remaining||0)});
destroy('stock');const phn=Object.keys(byPh).sort();
charts.stock=new Chart(document.getElementById('stockChart'),{type:'bar',data:{labels:phn,datasets:people.map((p,i)=>({label:p.Name,data:phn.map(ph=>Math.round((byPh[ph]?.[p.Name]||0)*10)/10),backgroundColor:PCOL[i],borderRadius:4}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:gc(),font:{size:10}}},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}});
document.getElementById('stockLeg').innerHTML=phn.map(p=>{const t=people.reduce((s,pr)=>s+(byPh[p]?.[pr.Name]||0),0);return`<div class="leg-i"><div class="leg-d" style="background:${PC[p]||'#666'}"></div>${p}: ${Math.round(t)}mg</div>`}).join('');

const sc2={Finished:0,'In Use':0,Unopened:0};vials.forEach(v=>{if(sc2.hasOwnProperty(v.Status))sc2[v.Status]++});
destroy('vial');charts.vial=new Chart(document.getElementById('vialChart'),{type:'doughnut',data:{labels:Object.keys(sc2),datasets:[{data:Object.values(sc2),backgroundColor:Object.keys(sc2).map(k=>SCC[k]),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{...ttip()}}}});
document.getElementById('vialLeg').innerHTML=Object.entries(sc2).map(([k,v])=>`<div class="leg-i"><div class="leg-d" style="background:${SCC[k]}"></div>${k} (${v})</div>`).join('');

const mo2={};injs.forEach(i=>{const d=ep2d(i.Date);if(!d)return;const ym=d.slice(0,7);if(!mo2[ym])mo2[ym]={};const pr=people.find(p=>p._id===i.Person);mo2[ym][pr?.Name||'?']=(mo2[ym][pr?.Name||'?']||0)+(i.Amount_mg||0)});
const mk=Object.keys(mo2).sort(),ml=mk.map(k=>{const[y,m]=k.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[+m]+" '"+y.slice(2)});
destroy('month');charts.month=new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:ml,datasets:people.map((p,i)=>({label:p.Name,data:mk.map(k=>Math.round((mo2[k]?.[p.Name]||0)*10)/10),backgroundColor:PCOL[i],borderRadius:3}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:gc(),font:{size:10}}},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}});
document.getElementById('ftr').textContent=tmu.toFixed(1)+'mg used \u2022 '+toh.toFixed(1)+'mg on hand \u2022 '+usd(tc)+' spent';
}
</script>
</body></html>
