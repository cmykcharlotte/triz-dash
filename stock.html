<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Overview</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#5a82b5;--sec:#c4785a;--pos:#5a9fc4;--neg:#c45a5a;--text:#d0d7de;--dim:#8b95a5;--muted:#6b7585;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1a2332;--dim:#5a6878;--muted:#8494a7;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px 28px 48px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}#loading p{color:var(--dim);font-size:14px}#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}.sub{font-size:13px;color:var(--dim);margin-top:4px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;flex:1 1 0;min-width:140;transition:background .3s,border-color .3s}
.sc-l{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:6px}
.sc-v{font-size:26px;font-weight:700;line-height:1.1}.sc-s{font-size:11px;color:var(--muted);margin-top:4px}
.stitle svg{flex-shrink:0;opacity:.85}
.stitle{display:flex;align-items:center;gap:8px;margin:28px 0 14px;font-size:15px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:background .3s,border-color .3s}
.cw{position:relative;width:100%;height:260px}.cw-sm{position:relative;width:100%;height:200px}
.two{display:flex;gap:14px;flex-wrap:wrap}.two .wide{flex:2 1 380px}.two .narrow{flex:1 1 240px}
table{width:100%;border-collapse:collapse;font-size:13px}thead tr{border-bottom:1px solid var(--border)}th{padding:10px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-weight:600}td{padding:9px 12px;border-bottom:1px solid var(--border)}
.mono{font-family:'DM Mono',monospace}
.dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:5px;vertical-align:middle}
.badge{display:inline-block;padding:3px 7px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase}
.b-pos{background:rgba(139,149,165,.08);color:var(--dim)}.b-pri{background:rgba(90,130,181,.1);color:var(--pri)}.b-dim{background:rgba(139,149,165,.08);color:var(--dim)}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim)}.leg-d{width:8px;height:8px;border-radius:2px}
.footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.bud-note{font-size:13px;color:var(--dim);line-height:1.6}
</style></head><body>
<div id="loading"><div class="spinner"></div><p>Connecting to Grist…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Stock Overview</h1><div class="sub" id="sub"></div></div><button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="stats"></div>
<div class="two"><div class="wide"><div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg> Stock by Pharmacy</div><div class="cc"><div class="cw"><canvas id="stockChart"></canvas></div></div></div><div class="narrow"><div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6M10 2v6.5L4.8 18.3a2 2 0 001.7 2.7h11a2 2 0 001.7-2.7L14 8.5V2"/><path d="M7 15h10"/></svg> Vial Status</div><div class="cc" style="text-align:center"><div class="cw-sm"><canvas id="statusChart"></canvas></div><div class="legend" id="statusLeg"></div></div></div></div>
<div class="two" style="margin-top:0"><div class="wide"><div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg> Cost Breakdown</div><div class="cc" id="costBox"></div></div><div class="narrow"><div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg> Notes</div><div class="cc" id="budBox"></div></div></div>
<div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg> Stock Detail</div><div class="cc" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table id="stockTable"><thead><tr><th>Vial</th><th>Pharmacy</th><th>Owner</th><th>mg</th><th>Used</th><th>Remaining</th><th>Status</th><th>BUD</th></tr></thead><tbody></tbody></table></div></div>
<div class="footer"><div>Stock Overview</div><div id="ftr"></div></div>
</div>
<script>
const PC={Hallandale:'#5a82b5',BPI:'#7ba3cc',Southend:'#c4785a',Olympia:'#d99b86'},SCC={Finished:'#8b95a5','In Use':'#5a82b5',Unopened:'#6b7585'};
let charts={},DATA=null;
function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p];if(DATA)render(DATA)}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('tirz-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
function gc(){return isDark()?'#8b95a5':'#8494a7'}function gg(){return isDark()?'#1e2a3a':'#dce1e8'}function gt(){return isDark()?'#d0d7de':'#1a2332'}
function ttip(){return{backgroundColor:isDark()?'#1c2636':'#fff',titleColor:isDark()?'#8b95a5':'#5a6878',bodyColor:isDark()?'#d0d7de':'#1a2332',borderColor:isDark()?'#2a3a4a':'#dce1e8',borderWidth:1,padding:12,cornerRadius:8,titleFont:{size:11},bodyFont:{size:13}}}
function usd(n){return n!=null?'$'+n.toLocaleString():'\u2014'}
grist.ready({requiredAccess:'full'});
async function load(){try{const[pe,ph,or,vi,inj]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Pharmacies'),grist.docApi.fetchTable('Orders'),grist.docApi.fetchTable('Vials'),grist.docApi.fetchTable('Injections')]);DATA={people:pe,pharmacies:ph,orders:or,vials:vi,injections:inj};document.getElementById('loading').style.display='none';document.getElementById('dash').style.display='block';render(DATA)}catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}}
load();grist.onRecords(()=>load());
function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);if(o.Effective_Weekly_Dose!==undefined&&o.Effective_weekly_dose===undefined)o.Effective_weekly_dose=o.Effective_Weekly_Dose;if(o.Actual_Weekly_Rate!==undefined&&o.Actual_weekly_dose===undefined)o.Actual_weekly_dose=o.Actual_Weekly_Rate;r.push(o)}return r}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function destroy(n){if(charts[n]){charts[n].destroy();charts[n]=null}}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

function render(D){
const people=toRows(D.people),pharms=toRows(D.pharmacies),orders=toRows(D.orders),vials=toRows(D.vials),injs=toRows(D.injections);
const pharmMap={};pharms.forEach(p=>pharmMap[p._id]=p);const orderMap={};orders.forEach(o=>orderMap[o._id]=o);const personMap={};people.forEach(p=>personMap[p._id]=p);
vials.forEach(v=>{const ord=orderMap[v.Order];v._ph=ord?pharmMap[ord.Pharmacy]:null;v._pr=ord?personMap[ord.Person]:null});
const tmgo=orders.reduce((s,o)=>s+(o.Total_mg||0),0),tmu=injs.reduce((s,i)=>s+(i.Amount_mg||0),0),tc=orders.reduce((s,o)=>s+(o.Cost||0),0),toh=vials.filter(v=>v.Status==='Unopened'||v.Status==='In Use').reduce((s,v)=>s+(v.mg_Remaining||0),0),twaste=vials.filter(v=>v.Status==='Finished'&&v.mg_Remaining>0).reduce((s,v)=>s+(v.mg_Remaining||0),0);
document.getElementById('sub').textContent=`${vials.length} vials \u2022 ${orders.length} orders \u2022 ${people.length} people`;
document.getElementById('stats').innerHTML=[
  sc('Total Ordered',tmgo+' mg',orders.length+' orders','var(--dim)'),
  sc('Total Used',tmu.toFixed(1)+' mg',injs.length+' injections','var(--pri)'),
  sc('Remaining',toh.toFixed(1)+' mg',vials.filter(v=>v.Status==='Unopened').length+' unopened','var(--sec)'),
  sc('Cost per mg Ordered','$'+(tc/tmgo).toFixed(2),usd(tc)+' total across '+orders.length+' orders','var(--dim)'),
].join('');

const byPh={};vials.forEach(v=>{const pn=v._ph?.Compounding_Pharmacy||'?';if(!byPh[pn])byPh[pn]={used:0,rem:0};byPh[pn].used+=(v.mg_Used||0);byPh[pn].rem+=(v.mg_Remaining||0)});
destroy('stock');const phn=Object.keys(byPh).sort();
charts.stock=new Chart(document.getElementById('stockChart'),{type:'bar',data:{labels:phn,datasets:[{label:'Used',data:phn.map(p=>Math.round(byPh[p].used*10)/10),backgroundColor:'rgba(196,90,90,.35)',borderRadius:4},{label:'Remaining',data:phn.map(p=>Math.round(byPh[p].rem*10)/10),backgroundColor:phn.map(p=>PC[p]||'#666'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:gc(),font:{size:11}}},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{stacked:true,ticks:{color:gc(),font:{size:11}},grid:{display:false}},y:{stacked:true,ticks:{color:gc(),font:{size:11}},grid:{color:gg()}}}}});

const sc2={Finished:0,'In Use':0,Unopened:0};vials.forEach(v=>{if(sc2.hasOwnProperty(v.Status))sc2[v.Status]++});
destroy('status');charts.status=new Chart(document.getElementById('statusChart'),{type:'doughnut',data:{labels:Object.keys(sc2),datasets:[{data:Object.values(sc2),backgroundColor:Object.keys(sc2).map(k=>SCC[k]),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false},tooltip:{...ttip()}}}});
document.getElementById('statusLeg').innerHTML=Object.entries(sc2).map(([k,v])=>`<div class="leg-i"><div class="leg-d" style="background:${SCC[k]}"></div>${k} (${v})</div>`).join('');

// Cost breakdown
const cpm=tc/tmgo,cpmu=tc/tmu;
const waste=vials.filter(v=>v.Status==='Finished'&&v.mg_Remaining>0).reduce((s,v)=>s+(v.mg_Remaining||0),0);
let cb=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">`;
cb+=`<div><div class="sc-l">Cost per mg Ordered</div><div style="font-size:20px;font-weight:700;color:var(--pri);margin:4px 0">$${cpm.toFixed(2)}</div></div>`;
cb+=`<div><div class="sc-l">Cost per mg Used</div><div style="font-size:20px;font-weight:700;color:var(--dim);margin:4px 0">$${cpmu.toFixed(2)}</div><div style="font-size:10px;color:var(--muted)">Higher due to waste</div></div>`;
cb+=`<div><div class="sc-l">Total Waste</div><div style="font-size:20px;font-weight:700;color:var(--dim);margin:4px 0">${waste.toFixed(1)}mg</div><div style="font-size:10px;color:var(--muted)">From ${vials.filter(v=>v.Status==='Finished'&&v.mg_Remaining>0).length} finished vials</div></div>`;
cb+=`<div><div class="sc-l">Total Spent</div><div style="font-size:20px;font-weight:700;color:var(--text);margin:4px 0">${usd(tc)}</div><div style="font-size:10px;color:var(--muted)">${orders.length} orders</div></div>`;
cb+=`</div>`;
document.getElementById('costBox').innerHTML=cb;

// BUD notes
let bh=`<div class="bud-note">Stock is properly stored and remains usable per owner assessment. BUD dates shown for reference only.</div>`;
document.getElementById('budBox').innerHTML=bh;

const tb=document.querySelector('#stockTable tbody');tb.innerHTML='';
vials.forEach(v=>{const pn=v._ph?.Compounding_Pharmacy||'\u2014';const pr=v._pr?.Name||'\u2014';const sb=v.Status==='Finished'?'b-pos':v.Status==='In Use'?'b-pri':'b-dim';
const tr=document.createElement('tr');tr.innerHTML=`<td style="font-weight:600">${v.Vial_Label||''}</td><td><span class="dot" style="background:${PC[pn]||'#6b7585'}"></span>${pn}</td><td style="color:var(--dim)">${pr}</td><td class="mono">${v.Total_mg||0}</td><td class="mono">${v.mg_Used||0}</td><td class="mono">${v.mg_Remaining||0}</td><td><span class="badge ${sb}">${v.Status||''}</span></td><td style="color:var(--muted);font-size:12px">${fmtD(ep2d(v.BUD))}</td>`;tb.appendChild(tr)});
document.getElementById('ftr').textContent=`${vials.length} vials \u2022 ${tmgo}mg ordered \u2022 ${usd(tc)} spent`;
}
</script></body></html>
