<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock overview</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#4a6fa5;--sec:#7a9e7e;--pos:#6bc78f;--neg:#d17b6a;--text:#e2e8f0;--dim:#7a8494;--muted:#5a6474;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1e293b;--dim:#7a8494;--muted:#9ca3af;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:20px 24px 40px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}#loading p{color:var(--dim);font-size:13px}#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px}
h1{font-size:20px;font-weight:700;letter-spacing:-.3px}.sub{font-size:12px;color:var(--dim);margin-top:3px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;cursor:pointer;font-size:12px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;flex:1 1 0;min-width:125;transition:background .3s,border-color .3s}
.sc-l{font-size:9px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:4px}
.sc-v{font-size:24px;font-weight:700;line-height:1.1}.sc-s{font-size:10px;color:var(--muted);margin-top:3px}
.stitle{display:flex;align-items:center;gap:8px;margin:24px 0 12px;font-size:14px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;transition:background .3s,border-color .3s}
.cw{position:relative;width:100%;height:240px}.cw-sm{position:relative;width:100%;height:180px}
.two{display:flex;gap:14px;flex-wrap:wrap}.two .wide{flex:2 1 380px}.two .narrow{flex:1 1 200px}
table{width:100%;border-collapse:collapse;font-size:12px}thead tr{border-bottom:1px solid var(--border)}th{padding:8px 10px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-weight:600}td{padding:7px 10px;border-bottom:1px solid var(--border)}
.mono{font-family:'DM Mono',monospace}
.dot{display:inline-block;width:7px;height:7px;border-radius:2px;margin-right:5px;vertical-align:middle}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;text-transform:uppercase}
.b-pos{background:rgba(107,199,143,.12);color:var(--pos)}.b-pri{background:rgba(74,111,165,.12);color:var(--pri)}.b-dim{background:rgba(122,132,148,.1);color:var(--dim)}.b-neg{background:rgba(209,123,106,.12);color:var(--neg)}
.legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.leg-i{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dim)}.leg-d{width:7px;height:7px;border-radius:2px}
.footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);font-size:10px;color:var(--muted);display:flex;justify-content:space-between}
.bud-note{font-size:12px;color:var(--dim);padding:8px 0;line-height:1.5}
</style></head><body>
<div id="loading"><div class="spinner"></div><p>Connecting to Grist…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Tirzepatide stock overview</h1><div class="sub" id="sub"></div></div><button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="stats"></div>
<div class="two"><div class="wide"><div class="stitle">Stock by pharmacy</div><div class="cc"><div class="cw"><canvas id="stockChart"></canvas></div><div class="legend" id="stockLeg"></div></div></div><div class="narrow"><div class="stitle">Vial status</div><div class="cc" style="text-align:center"><div class="cw-sm"><canvas id="statusChart"></canvas></div><div class="legend" id="statusLeg"></div></div></div></div>
<div class="two" style="margin-top:0"><div class="wide"><div class="stitle">Spending by person</div><div class="cc"><div class="cw-sm"><canvas id="spendChart"></canvas></div></div></div><div class="narrow"><div class="stitle">BUD notes</div><div class="cc" id="budBox"></div></div></div>
<div class="stitle">Stock detail</div><div class="cc" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table id="stockTable"><thead><tr><th>Vial</th><th>Pharmacy</th><th>Owner</th><th>mg</th><th>Used</th><th>Left</th><th>Status</th><th>BUD</th></tr></thead><tbody></tbody></table></div></div>
<div class="footer"><div>Stock overview • Grist custom widget</div><div id="ftr"></div></div>
</div>
<script>
const PC={Hallandale:'#4a6fa5',BPI:'#7a9e7e',Southend:'#d17b6a',Olympia:'#c4985a'},SCC={Finished:'#6bc78f','In Use':'#4a6fa5',Unopened:'#5a6474'},PCOL=['#4a6fa5','#7a9e7e'];
let charts={},DATA=null;
function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p];if(DATA)render(DATA)}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('tirz-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
function gc(){return isDark()?'#7a8494':'#9ca3af'}function gg(){return isDark()?'#1e2a3a':'#dce1e8'}function gt(){return isDark()?'#e2e8f0':'#1e293b'}
function ttip(){return{backgroundColor:isDark()?'#172030':'#fff',titleColor:'#7a8494',bodyColor:isDark()?'#e2e8f0':'#1e293b',borderColor:isDark()?'#2a3448':'#dce1e8',borderWidth:1,padding:10,cornerRadius:8,titleFont:{size:11},bodyFont:{size:12}}}
grist.ready({requiredAccess:'full'});
async function load(){try{const[pe,ph,or,vi,inj]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Pharmacies'),grist.docApi.fetchTable('Orders'),grist.docApi.fetchTable('Vials'),grist.docApi.fetchTable('Injections')]);DATA={people:pe,pharmacies:ph,orders:or,vials:vi,injections:inj};document.getElementById('loading').style.display='none';document.getElementById('dash').style.display='block';render(DATA)}catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}}
load();grist.onRecords(()=>load());
function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function usd(n){return n!=null?'$'+n.toLocaleString():'\u2014'}
function destroy(n){if(charts[n]){charts[n].destroy();charts[n]=null}}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

function render(D){
const people=toRows(D.people),pharms=toRows(D.pharmacies),orders=toRows(D.orders),vials=toRows(D.vials),injs=toRows(D.injections);
const pharmMap={};pharms.forEach(p=>pharmMap[p._id]=p);const orderMap={};orders.forEach(o=>orderMap[o._id]=o);const personMap={};people.forEach(p=>personMap[p._id]=p);
vials.forEach(v=>{const ord=orderMap[v.Order];v._ph=ord?pharmMap[ord.Pharmacy]:null;v._pr=ord?personMap[ord.Person]:null});
const tmgo=orders.reduce((s,o)=>s+(o.Total_mg||0),0),tmu=injs.reduce((s,i)=>s+(i.Amount_mg||0),0),tc=orders.reduce((s,o)=>s+(o.Cost||0),0),toh=tmgo-tmu;
document.getElementById('sub').textContent=`${vials.length} vials \u2022 ${orders.length} orders \u2022 ${people.length} people`;
document.getElementById('stats').innerHTML=[
  sc('Total ordered',tmgo+' mg',orders.length+' orders','var(--dim)'),
  sc('Total used',tmu.toFixed(1)+' mg',injs.length+' injections','var(--pri)'),
  sc('Remaining',toh.toFixed(1)+' mg',vials.filter(v=>v.Status==='Unopened').length+' unopened','var(--sec)'),
  sc('Total spent',usd(tc),'$'+(tc/tmgo).toFixed(2)+'/mg','var(--dim)'),
].join('');

const byPh={};vials.forEach(v=>{const pn=v._ph?.Compounding_Pharmacy||'?';if(!byPh[pn])byPh[pn]={used:0,rem:0};byPh[pn].used+=(v.mg_Used||0);byPh[pn].rem+=(v.mg_Remaining||0)});
destroy('stock');const phn=Object.keys(byPh).sort();
charts.stock=new Chart(document.getElementById('stockChart'),{type:'bar',data:{labels:phn,datasets:[{label:'Used',data:phn.map(p=>byPh[p].used),backgroundColor:'rgba(74,111,165,.5)',borderRadius:4},{label:'Remaining',data:phn.map(p=>byPh[p].rem),backgroundColor:phn.map(p=>PC[p]||'#666'),borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:gc(),font:{size:10}}},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{display:false}},y:{stacked:true,ticks:{color:gc(),font:{size:10}},grid:{color:gg()}}}}});

const sc2={Finished:0,'In Use':0,Unopened:0};vials.forEach(v=>{if(sc2.hasOwnProperty(v.Status))sc2[v.Status]++});
destroy('status');charts.status=new Chart(document.getElementById('statusChart'),{type:'doughnut',data:{labels:Object.keys(sc2),datasets:[{data:Object.values(sc2),backgroundColor:Object.keys(sc2).map(k=>SCC[k]),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'60%',plugins:{legend:{display:false},tooltip:{...ttip()}}}});
document.getElementById('statusLeg').innerHTML=Object.entries(sc2).map(([k,v])=>`<div class="leg-i"><div class="leg-d" style="background:${SCC[k]}"></div>${k} (${v})</div>`).join('');

destroy('spend');charts.spend=new Chart(document.getElementById('spendChart'),{type:'bar',data:{labels:people.map(p=>p.Name),datasets:[{data:people.map(p=>orders.filter(o=>o.Person===p._id).reduce((s,o)=>s+(o.Cost||0),0)),backgroundColor:PCOL,borderRadius:6,maxBarThickness:60}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>'$'+c.parsed.x.toLocaleString()}}},scales:{x:{ticks:{color:gc(),font:{size:10},callback:v=>'$'+v.toLocaleString()},grid:{color:gg()}},y:{ticks:{color:gt(),font:{size:13,weight:600}},grid:{display:false}}}}});

// Softened BUD notes
const pastBud=vials.filter(v=>v.Days_Until_BUD&&v.Days_Until_BUD<0&&v.Status!=='Finished');
let bh=`<div class="bud-note">${pastBud.length} of ${vials.filter(v=>v.Status!=='Finished').length} non-finished vials are past their labeled BUD.</div>`;
bh+=`<div class="bud-note" style="color:var(--muted)">Stock is properly stored and remains usable per owner assessment. BUD dates shown for reference only.</div>`;
document.getElementById('budBox').innerHTML=bh;

const tb=document.querySelector('#stockTable tbody');tb.innerHTML='';
vials.forEach(v=>{const pn=v._ph?.Compounding_Pharmacy||'\u2014';const pr=v._pr?.Name||'\u2014';const sb=v.Status==='Finished'?'b-pos':v.Status==='In Use'?'b-pri':'b-dim';
const tr=document.createElement('tr');tr.innerHTML=`<td style="font-weight:600;font-size:12px">${v.Vial_Label||''}</td><td><span class="dot" style="background:${PC[pn]||'#666'}"></span>${pn}</td><td style="color:var(--dim)">${pr}</td><td class="mono">${v.Total_mg||0}</td><td class="mono">${v.mg_Used||0}</td><td class="mono">${v.mg_Remaining||0}</td><td><span class="badge ${sb}">${v.Status||''}</span></td><td style="color:var(--muted);font-size:11px">${fmtD(ep2d(v.BUD))}</td>`;tb.appendChild(tr)});
document.getElementById('ftr').textContent=`${vials.length} vials \u2022 ${tmgo}mg ordered \u2022 ${usd(tc)} spent`;
}
</script></body></html>
