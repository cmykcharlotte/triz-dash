<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Injection Log</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#5a82b5;--sec:#c4785a;--pos:#5a9fc4;--neg:#c45a5a;--text:#d0d7de;--dim:#8b95a5;--muted:#6b7585;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1a2332;--dim:#5a6878;--muted:#8494a7;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px 28px 48px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--sec);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}#loading p{color:var(--dim);font-size:14px}#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}.sub{font-size:13px;color:var(--dim);margin-top:4px}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;flex:1 1 0;min-width:130px;transition:background .3s,border-color .3s}
.sc-l{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:6px}
.sc-v{font-size:26px;font-weight:700;line-height:1.1}.sc-s{font-size:11px;color:var(--muted);margin-top:4px}
.stitle svg{flex-shrink:0;opacity:.85}
.stitle{display:flex;align-items:center;gap:8px;margin:28px 0 14px;font-size:15px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:0;overflow:hidden;transition:background .3s,border-color .3s}
.mono{font-family:'DM Mono',monospace}
.footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{position:sticky;top:0;z-index:1}
th{text-align:left;padding:10px 12px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);background:var(--card);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap;transition:color .2s}
th:hover{color:var(--text)}
th .sort-arrow{font-size:8px;margin-left:3px;opacity:.5}
th.sorted .sort-arrow{opacity:1;color:var(--pri)}
td{padding:8px 12px;border-bottom:1px solid var(--border);transition:background .2s}
tr:hover td{background:rgba(90,130,181,.04)}
.var-pos{color:var(--pos)}.var-neg{color:var(--neg)}.var-zero{color:var(--dim)}
.wt-loss{color:var(--pos)}.wt-gain{color:var(--neg)}
.no-data{color:var(--muted);font-style:italic}
.scroll-wrap{overflow-x:auto;max-height:70vh;overflow-y:auto}
.filter-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select,.filter-bar input{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:var(--text);font-family:'DM Sans',sans-serif}
.filter-bar select:focus,.filter-bar input:focus{outline:none;border-color:var(--pri)}
.filter-bar label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.count-badge{font-size:11px;color:var(--dim);padding:4px 10px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-left:auto}
</style></head><body>
<div id="loading"><div class="spinner"></div><p>Loading injection log…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Charlotte's Injection Log</h1><div class="sub" id="sub"></div></div><button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="stats"></div>
<div class="filter-bar" id="filterBar"></div>
<div class="stitle"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg> All Injections <span class="count-badge" id="countBadge"></span></div>
<div class="cc"><div class="scroll-wrap"><table id="logTable"><thead id="logHead"></thead><tbody id="logBody"></tbody></table></div></div>
<div class="footer"><div>Charlotte's Injection Log</div><div id="ftr"></div></div>
</div>
<script>
const PN='Charlotte';
let DATA=null,allRows=[],sortCol='Date',sortDir=-1,filterYear='all';
function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p];if(DATA)render(DATA)}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('tirz-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function isDark(){return document.documentElement.getAttribute('data-theme')==='dark'}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);if(o.Effective_Weekly_Dose!==undefined&&o.Effective_weekly_dose===undefined)o.Effective_weekly_dose=o.Effective_Weekly_Dose;if(o.Actual_Weekly_Rate!==undefined&&o.Actual_weekly_dose===undefined)o.Actual_weekly_dose=o.Actual_Weekly_Rate;r.push(o)}return r}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

const cols=[
  {id:'Date',label:'Date',fmt:r=>fmtD(ep2d(r.Date)),sort:r=>r.Date||0,cls:''},
  {id:'Amount_mg',label:'Dose',fmt:r=>r.Amount_mg?`<strong>${r.Amount_mg}mg</strong>`:'—',sort:r=>r.Amount_mg||0,cls:'mono'},
  {id:'Dosing_Frequency_Days',label:'Freq',fmt:r=>r.Dosing_Frequency_Days||'—',sort:r=>r.Dosing_Frequency_Days||0,cls:'mono'},
  {id:'Effective_weekly_dose',label:'EWD',fmt:r=>r.Effective_weekly_dose||'—',sort:r=>r.Effective_weekly_dose||0,cls:'mono'},
  {id:'Actual_weekly_dose',label:'AWD',fmt:r=>r.Actual_weekly_dose||'—',sort:r=>r.Actual_weekly_dose||0,cls:'mono'},
  {id:'Actual_Interval',label:'Interval',fmt:r=>r.Actual_Interval!=null?r.Actual_Interval+'d':'—',sort:r=>r.Actual_Interval||0,cls:'mono'},
  {id:'Timing_Variance',label:'Variance',fmt:r=>{const v=r.Timing_Variance;if(v==null)return'—';const cls=v>1?'var-neg':v<-1?'var-pos':'var-zero';const s=v>0?'+':'';return`<span class="${cls}">${s}${v}d</span>`},sort:r=>r.Timing_Variance||0,cls:''},
  {id:'Weight',label:'Weight',fmt:r=>r.Weight&&r.Weight>0?r.Weight:'<span class="no-data">—</span>',sort:r=>(r.Weight&&r.Weight>0)?r.Weight:0,cls:'mono'},
  {id:'Weight_Change',label:'\u0394 Weight',fmt:r=>{const w=r.Weight_Change;if(w==null)return'<span class="no-data">—</span>';const cls=w<0?'wt-loss':w>0?'wt-gain':'var-zero';return`<span class="${cls}">${w>0?'+':''}${w}</span>`},sort:r=>r.Weight_Change||0,cls:''},
  {id:'Notes',label:'Notes',fmt:r=>r.Notes?`<span style="font-size:11px;color:var(--dim)">${r.Notes}</span>`:'',sort:r=>r.Notes||'',cls:''},
];

function buildHead(){
  let h='<tr>';
  cols.forEach(c=>{
    const active=sortCol===c.id;
    const arrow=active?(sortDir>0?'\u25B2':'\u25BC'):'';
    h+=`<th class="${active?'sorted':''}" onclick="doSort('${c.id}')">${c.label}<span class="sort-arrow">${arrow}</span></th>`;
  });
  h+='</tr>';
  document.getElementById('logHead').innerHTML=h;
}

function buildBody(){
  let rows=allRows;
  if(filterYear!=='all')rows=rows.filter(r=>{const d=ep2d(r.Date);return d&&d.startsWith(filterYear)});
  const col=cols.find(c=>c.id===sortCol);
  if(col)rows=[...rows].sort((a,b)=>{const av=col.sort(a),bv=col.sort(b);if(av<bv)return-1*sortDir;if(av>bv)return 1*sortDir;return 0});
  let h='';
  rows.forEach(r=>{
    h+='<tr>';
    cols.forEach(c=>h+=`<td class="${c.cls}">${c.fmt(r)}</td>`);
    h+='</tr>';
  });
  document.getElementById('logBody').innerHTML=h;
  document.getElementById('countBadge').textContent=rows.length+(rows.length!==allRows.length?' of '+allRows.length:'');
}

function doSort(colId){
  if(sortCol===colId)sortDir*=-1;
  else{sortCol=colId;sortDir=colId==='Date'?-1:1}
  buildHead();buildBody();
}

function render(data){
  DATA=data;
  const{people,injs,vials}=data;
  const person=people.find(p=>p.Name===PN);if(!person)return;
  const pid=person._id;
  allRows=injs.filter(i=>i.Person===pid).sort((a,b)=>(b.Date||0)-(a.Date||0));
  const ti=allRows.length;
  const tm=allRows.reduce((s,i)=>s+(i.Amount_mg||0),0);
  const fd=allRows.length?ep2d(allRows[allRows.length-1].Date):null;
  const ld=allRows.length?ep2d(allRows[0].Date):null;
  const li=allRows[0];
  const ww=allRows.filter(i=>i.Weight&&i.Weight>0);
  const wtPct=Math.round(ww.length/ti*100);
  const withVar=allRows.filter(i=>i.Timing_Variance!=null);
  const onTime=withVar.filter(i=>Math.abs(i.Timing_Variance)<=1).length;
  const onPct=withVar.length?Math.round(onTime/withVar.length*100):0;

  document.getElementById('sub').textContent=`${fmtD(fd)} \u2192 ${fmtD(ld)} \u2022 ${ti} injections`;
  document.getElementById('stats').innerHTML=[
    sc('Total mg',tm.toFixed(1),'Avg '+Math.round(tm/ti*10)/10+'mg/injection','var(--pri)'),
    sc('Current EWD',li?.Effective_weekly_dose?li.Effective_weekly_dose+'mg':'\u2014',li?li.Amount_mg+'mg every '+li.Dosing_Frequency_Days+'d':'','var(--sec)'),
    sc('Adherence',onPct+'%','On schedule (\u00B11 day)','var(--pos)'),
    sc('Weight Data',wtPct+'%',ww.length+' of '+ti+' injections',wtPct>=70?'var(--pos)':wtPct>=40?'var(--sec)':'var(--neg)'),
  ].join('');

  // Year filter
  const years=new Set();allRows.forEach(r=>{const d=ep2d(r.Date);if(d)years.add(d.slice(0,4))});
  const ys=[...years].sort().reverse();
  let fb='<label>Year</label><select id="yearFilter" onchange="filterYear=this.value;buildBody()">';
  fb+='<option value="all">All</option>';
  ys.forEach(y=>fb+=`<option value="${y}"${filterYear===y?' selected':''}>${y}</option>`);
  fb+='</select>';
  document.getElementById('filterBar').innerHTML=fb;

  buildHead();
  buildBody();
  document.getElementById('ftr').textContent=`${ti} injections \u2022 ${tm.toFixed(1)}mg total`;
}

grist.ready({requiredAccess:'full'});
grist.on('message',async()=>{
  try{
    const[ppl,inj,vi]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Injections'),grist.docApi.fetchTable('Vials')]);
    const data={people:toRows(ppl),injs:toRows(inj),vials:toRows(vi)};
    document.getElementById('loading').style.display='none';
    document.getElementById('dash').style.display='block';
    render(data);
  }catch(e){document.getElementById('loading').innerHTML=`<p style="color:var(--neg)">${e.message}</p>`}
});
</script></body></html>
