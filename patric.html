<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Patric</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#111826;--card:#172030;--border:#1e2a3a;--pri:#4a6fa5;--sec:#7a9e7e;--pos:#6bc78f;--neg:#d17b6a;--text:#d0d7de;--dim:#8b95a5;--muted:#6b7585;--grid:#1e2a3a}
[data-theme="light"]{--bg:#f5f7fa;--card:#ffffff;--border:#dce1e8;--text:#1a2332;--dim:#5a6878;--muted:#8494a7;--grid:#dce1e8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);padding:24px 28px 48px;transition:background .3s,color .3s}
#loading{display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:12px}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--sec);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}#loading p{color:var(--dim);font-size:14px}#dash{display:none}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px}
h1{font-size:22px;font-weight:700;letter-spacing:-.3px}.sub{font-size:13px;color:var(--dim);margin-top:4px}
.inactive{display:inline-block;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;background:rgba(139,149,165,.1);color:var(--dim);margin-left:8px;vertical-align:middle}
.theme-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;color:var(--dim);font-family:'DM Sans',sans-serif;transition:all .2s;display:flex;align-items:center;gap:5px}.theme-btn:hover{border-color:var(--pri);color:var(--text)}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;flex:1 1 0;min-width:140;transition:background .3s,border-color .3s}
.sc-l{font-size:10px;text-transform:uppercase;letter-spacing:1.1px;color:var(--dim);margin-bottom:6px}
.sc-v{font-size:26px;font-weight:700;line-height:1.1}.sc-s{font-size:11px;color:var(--muted);margin-top:4px}
.stitle{margin:28px 0 14px;font-size:15px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;transition:background .3s,border-color .3s}
.cw{position:relative;width:100%;height:240px}.cw-sm{position:relative;width:100%;height:200px}
.two{display:flex;gap:14px;flex-wrap:wrap}.two .wide{flex:2 1 380px}.two .narrow{flex:1 1 240px}
table{width:100%;border-collapse:collapse;font-size:13px}thead tr{border-bottom:1px solid var(--border)}th{padding:10px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--dim);font-weight:600}td{padding:9px 12px;border-bottom:1px solid var(--border)}
.mono{font-family:'DM Mono',monospace}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim)}.leg-d{width:8px;height:8px;border-radius:2px}
.footer{margin-top:28px;padding-top:14px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);display:flex;justify-content:space-between}
.summary{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;font-size:13px;color:var(--dim);line-height:1.7;transition:background .3s,border-color .3s}
.summary strong{color:var(--text);font-weight:600}
.summary .s-metric{display:inline-block;color:var(--pri);font-weight:700;font-family:'DM Mono',monospace}
</style></head><body>
<div id="loading"><div class="spinner"></div><p>Loading Patric's data…</p></div>
<div id="dash">
<div class="hdr"><div><h1>Patric's tirzepatide record <span class="inactive">Inactive</span></h1><div class="sub" id="sub"></div></div><button class="theme-btn" id="themeBtn" onclick="cycleTheme()"></button></div>
<div class="stats" id="stats"></div>
<div class="two"><div class="wide"><div class="stitle">Dose over time</div><div class="cc"><div class="cw"><canvas id="doseChart"></canvas></div></div></div><div class="narrow"><div class="stitle">Treatment summary</div><div class="summary" id="summaryBox"></div></div></div>
<div class="two"><div class="wide"><div class="stitle">Monthly mg</div><div class="cc"><div class="cw-sm"><canvas id="monthChart"></canvas></div></div></div><div class="narrow"><div class="stitle">Use by pharmacy</div><div class="cc" style="text-align:center"><div class="cw-sm"><canvas id="pharmChart"></canvas></div><div class="legend" id="pharmLeg"></div></div></div></div>
<div class="stitle">Injection log</div><div class="cc" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table id="injTable"><thead><tr><th>Date</th><th>Dose</th><th>Frequency</th><th>Effective weekly dose</th></tr></thead><tbody></tbody></table></div></div>
<div class="footer"><div>Patric's record</div><div id="ftr"></div></div>
</div>
<script>
const PN='Patric',PC={Hallandale:'#4a6fa5',BPI:'#5e88b8'};let charts={},DATA=null;
function getThemePref(){return localStorage.getItem('tirz-theme')||'auto'}
function resolveTheme(p){if(p==='light'||p==='dark')return p;return matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'}
function applyTheme(){const p=getThemePref(),r=resolveTheme(p);document.documentElement.setAttribute('data-theme',r);const L={auto:'Auto',light:'Light',dark:'Dark'},I={auto:'\u2728',light:'\u2600\uFE0F',dark:'\uD83C\uDF19'};document.getElementById('themeBtn').textContent=I[p]+' '+L[p];if(DATA)render(DATA)}
function cycleTheme(){const o=['auto','light','dark'],c=getThemePref();localStorage.setItem('tirz-theme',o[(o.indexOf(c)+1)%3]);applyTheme()}
applyTheme();
function isDark(){return document.documentElement.getAttribute('data-theme')!=='light'}
function gc(){return isDark()?'#8b95a5':'#8494a7'}function gg(){return isDark()?'#1e2a3a':'#dce1e8'}
function ttip(){return{backgroundColor:isDark()?'#1c2636':'#fff',titleColor:isDark()?'#8b95a5':'#5a6878',bodyColor:isDark()?'#d0d7de':'#1a2332',borderColor:isDark()?'#2a3a4a':'#dce1e8',borderWidth:1,padding:12,cornerRadius:8,titleFont:{size:11},bodyFont:{size:13}}}
grist.ready({requiredAccess:'full'});
async function load(){try{const[pe,ph,or,vi,inj]=await Promise.all([grist.docApi.fetchTable('People'),grist.docApi.fetchTable('Pharmacies'),grist.docApi.fetchTable('Orders'),grist.docApi.fetchTable('Vials'),grist.docApi.fetchTable('Injections')]);DATA={people:pe,pharmacies:ph,orders:or,vials:vi,injections:inj};document.getElementById('loading').style.display='none';document.getElementById('dash').style.display='block';render(DATA)}catch(e){document.querySelector('#loading p').textContent='Error: '+e.message}}
load();grist.onRecords(()=>load());
function toRows(t){const ks=Object.keys(t).filter(k=>k!=='id'&&k!=='manualSort');const r=[];for(let i=0;i<(t.id?.length||0);i++){const o={_id:t.id[i]};ks.forEach(k=>o[k]=t[k][i]);r.push(o)}return r}
function ep2d(ts){if(!ts)return null;return new Date(ts*1000).toISOString().slice(0,10)}
function fmtD(iso){if(!iso)return'\u2014';const[y,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}, ${y}`}
function fmtS(iso){if(!iso)return'';const[,m,d]=iso.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return`${M[+m]} ${+d}`}
function destroy(n){if(charts[n]){charts[n].destroy();charts[n]=null}}
function sc(l,v,s,c){return`<div class="sc"><div class="sc-l">${l}</div><div class="sc-v" style="color:${c}">${v}</div>${s?`<div class="sc-s">${s}</div>`:''}</div>`}

function render(D){
const people=toRows(D.people),injs=toRows(D.injections);
const person=people.find(p=>p.Name===PN);if(!person)return;const pid=person._id;
const pi=injs.filter(i=>i.Person===pid).sort((a,b)=>(a.Date||0)-(b.Date||0));
const tm=pi.reduce((s,i)=>s+(i.Amount_mg||0),0);
const fd=pi.length?ep2d(pi[0].Date):null,ld=pi.length?ep2d(pi[pi.length-1].Date):null;
const days=pi.length?Math.round((pi[pi.length-1].Date-pi[0].Date)/86400):0;
document.getElementById('sub').textContent=`${fmtD(fd)} \u2192 ${fmtD(ld)} \u2022 ${days} days \u2022 Discontinued`;
document.getElementById('stats').innerHTML=[
  sc('Injections',pi.length,'Over '+days+' days','var(--pri)'),
  sc('Total mg',tm.toFixed(1),'Avg '+(tm/pi.length).toFixed(2)+'mg per injection','var(--sec)'),
  sc('Peak dose','2.5mg','Weekly','var(--dim)'),
  sc('Final dose','0.75mg','Every 4 days','var(--dim)'),
].join('');

// Summary
const pu={Hallandale:0,BPI:0};pi.forEach((i,idx)=>{if(idx<5)pu.Hallandale+=(i.Amount_mg||0);else pu.BPI+=(i.Amount_mg||0)});
let sh=`<strong>Used tirzepatide for <span class="s-metric">${days}</span> days</strong> (${fmtD(fd)} through ${fmtD(ld)}). `;
sh+=`Started at <span class="s-metric">2.5mg</span> weekly, tapered to <span class="s-metric">0.75mg</span> every 4 days before discontinuing.`;
sh+=`<br><br><strong>Source:</strong> Charlotte's stash (BPI vials primarily)`;
sh+=`<br><strong>Hallandale:</strong> 5 injections (<span class="s-metric">${pu.Hallandale.toFixed(1)}mg</span>)`;
sh+=`<br><strong>BPI:</strong> ${pi.length-5} injections (<span class="s-metric">${pu.BPI.toFixed(1)}mg</span>)`;
document.getElementById('summaryBox').innerHTML=sh;

destroy('dose');charts.dose=new Chart(document.getElementById('doseChart'),{type:'line',data:{labels:pi.map(d=>fmtS(ep2d(d.Date))),datasets:[{label:'Dose',data:pi.map(d=>d.Amount_mg),borderColor:'#7a9e7e',backgroundColor:isDark()?'rgba(122,158,126,.06)':'rgba(122,158,126,.1)',fill:true,tension:.2,pointRadius:2,pointBackgroundColor:'#7a9e7e',borderWidth:1.5},...(pi.some(i=>i.Effective_Weekly_Dose>0)?[{label:'Effective weekly dose',data:pi.map(d=>d.Effective_Weekly_Dose>0?d.Effective_Weekly_Dose:null),borderColor:'#4a6fa5',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false,spanGaps:true}]:[])]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:gc(),font:{size:11}}},tooltip:{...ttip(),callbacks:{label:c=>c.dataset.label+': '+c.parsed.y+'mg'}}},scales:{x:{ticks:{color:gc(),font:{size:11},maxTicksLimit:10},grid:{color:gg()}},y:{ticks:{color:gc(),font:{size:11}},grid:{color:gg()}}}}});

const mo={};pi.forEach(i=>{const d=ep2d(i.Date);if(!d)return;const ym=d.slice(0,7);mo[ym]=(mo[ym]||0)+(i.Amount_mg||0)});
const mk=Object.keys(mo).sort(),ml=mk.map(k=>{const[y,m]=k.split('-');const M=['','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return M[+m]+" '"+y.slice(2)});
destroy('month');charts.month=new Chart(document.getElementById('monthChart'),{type:'bar',data:{labels:ml,datasets:[{data:mk.map(k=>Math.round(mo[k]*10)/10),backgroundColor:'rgba(122,158,126,.5)',borderColor:'#7a9e7e',borderWidth:1,borderRadius:5,maxBarThickness:36}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>c.parsed.y+'mg'}}},scales:{x:{ticks:{color:gc(),font:{size:11}},grid:{display:false}},y:{ticks:{color:gc(),font:{size:11}},grid:{color:gg()}}}}});

destroy('pharm');const pns=Object.keys(pu);
charts.pharm=new Chart(document.getElementById('pharmChart'),{type:'doughnut',data:{labels:pns,datasets:[{data:pns.map(p=>Math.round(pu[p]*10)/10),backgroundColor:pns.map(p=>PC[p]),borderWidth:0,spacing:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{...ttip(),callbacks:{label:c=>{const t=pns.reduce((s,p)=>s+pu[p],0);return c.label+': '+c.parsed+'mg ('+Math.round(c.parsed/t*100)+'%)'}}}}}});
document.getElementById('pharmLeg').innerHTML=pns.map(p=>`<div class="leg-i"><div class="leg-d" style="background:${PC[p]}"></div>${p} (${Math.round(pu[p]*10)/10}mg)</div>`).join('');

const it=document.querySelector('#injTable tbody');it.innerHTML='';
pi.forEach(i=>{const tr=document.createElement('tr');const f=i.Dosing_Frequency_Days;const fs=f===7?'Weekly':f?'Every '+f+' days':'\u2014';tr.innerHTML=`<td style="color:var(--dim)">${fmtD(ep2d(i.Date))}</td><td class="mono" style="font-weight:600">${i.Amount_mg}mg</td><td style="color:var(--dim)">${fs}</td><td class="mono">${i.Effective_Weekly_Dose>0?i.Effective_Weekly_Dose+'mg':'\u2014'}</td>`;it.appendChild(tr)});
document.getElementById('ftr').textContent=`${pi.length} injections \u2022 ${tm.toFixed(1)}mg \u2022 ${fmtD(fd)} \u2013 ${fmtD(ld)}`;
}
</script></body></html>
